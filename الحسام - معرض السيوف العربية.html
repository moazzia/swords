<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="الحسام - معرض تفاعلي للسيوف العربية والأسلحة التراثية السعودية">
<meta name="keywords" content="سيوف عربية, تراث سعودي, الحسام, أسلحة تراثية">
<meta name="author" content="معاذ أنيس">
<title>الحسام | معرض السيوف العربية</title>
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0704;font-family:'Amiri',serif}

/* ───── INTRO PAGE ───── */
#intro{
position:fixed;inset:0;
background:radial-gradient(ellipse at center,#1c0f04 0%,#0a0704 75%);
display:flex;flex-direction:column;align-items:center;justify-content:center;
z-index:2000;
transition:opacity 0.9s ease;
direction:rtl;
gap:clamp(14px,3vh,28px);
}
#intro.hide{opacity:0;pointer-events:none}

.intro-title{
font-family:'Scheherazade New',serif;
font-size:clamp(2rem,7vw,3.5rem);
font-weight:700;color:#c9973a;
text-shadow:0 0 40px rgba(201,151,58,0.4);
}
.intro-line{width:120px;height:1px;background:linear-gradient(90deg,transparent,#c9973a,transparent)}

.intro-label{
font-family:'Amiri',serif;
font-size:clamp(0.85rem,2.2vw,1.1rem);
color:#6a4f20;letter-spacing:0.08em;
}

/* file pick area */
.file-zone{
display:flex;flex-direction:column;align-items:center;gap:12px;
}
.file-pick-btn{
position:relative;overflow:hidden;
background:rgba(201,151,58,0.08);
border:1px solid rgba(201,151,58,0.35);
color:#c9973a;
font-family:'Amiri',serif;
font-size:clamp(0.9rem,2.2vw,1.1rem);
padding:0.55rem 2rem;
cursor:pointer;
border-radius:6px;
transition:background 0.3s;
}
.file-pick-btn:hover{background:rgba(201,151,58,0.18)}
.file-pick-btn input[type=file]{
position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;
}
.file-chosen{
font-size:clamp(0.7rem,1.8vw,0.9rem);
color:#8a6a30;max-width:260px;text-align:center;
word-break:break-all;line-height:1.5;
min-height:1.2em;
}

/* fs + start row */
.intro-actions{
display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:center;
}
#introFsBtn{
background:rgba(201,151,58,0.08);
border:1px solid rgba(201,151,58,0.35);
color:#c9973a;
width:clamp(38px,5vw,50px);height:clamp(38px,5vw,50px);
border-radius:8px;
cursor:pointer;
display:flex;align-items:center;justify-content:center;
transition:background 0.3s;
flex-shrink:0;
}
#introFsBtn:hover{background:rgba(201,151,58,0.22)}

#startBtn{
background:rgba(201,151,58,0.12);
border:1px solid #c9973a;
color:#c9973a;
font-family:'Amiri',serif;
font-size:clamp(0.95rem,2.4vw,1.15rem);
padding:0.6rem 2.4rem;
cursor:pointer;
border-radius:6px;
transition:background 0.3s,color 0.3s;
}
#startBtn:hover{background:#c9973a;color:#0a0704}

/* ───── SPLASH ───── */
#splash{
position:fixed;inset:0;
background:radial-gradient(ellipse at center,#1c0f04 0%,#0a0704 75%);
display:none;flex-direction:column;align-items:center;justify-content:center;
z-index:1000;
transition:opacity 1.2s ease;
direction:rtl;
}
#splash.visible{display:flex}
#splash.hide{opacity:0;pointer-events:none}

.splash-royals{
display:flex;align-items:flex-end;justify-content:center;
gap:clamp(30px,8vw,90px);
margin-bottom:clamp(20px,4vh,40px);
}
.royal-block{display:flex;flex-direction:column;align-items:center;gap:8px}
.royal-block img{
width:clamp(80px,14vw,130px);
height:clamp(80px,14vw,130px);
object-fit:cover;border-radius:50%;border:2px solid #c9973a;
}
.royal-label{
font-family:'Amiri',serif;
font-size:clamp(0.65rem,1.6vw,0.85rem);
color:#8a6a30;text-align:center;line-height:1.5;
}
.splash-title{
font-family:'Scheherazade New',serif;
font-size:clamp(5rem,18vw,11rem);
font-weight:700;color:#c9973a;line-height:1;
letter-spacing:0.04em;
text-shadow:0 0 60px rgba(201,151,58,0.5);
}
.splash-line{width:140px;height:1px;background:linear-gradient(90deg,transparent,#c9973a,transparent);margin:1.4rem auto}
.splash-sub{font-family:'Amiri',serif;font-size:clamp(0.95rem,2.8vw,1.3rem);color:#7a5a28;letter-spacing:0.12em;text-align:center}

/* ───── APP ───── */
#app{position:fixed;inset:0;display:none;flex-direction:column}
#app.show{display:flex}

header{
position:relative;height:clamp(56px,9vh,80px);
background:linear-gradient(180deg,#0d0906 0%,transparent 100%);
display:flex;align-items:center;justify-content:center;
z-index:10;flex-shrink:0;direction:rtl;
}
.header-title{
font-family:'Scheherazade New',serif;
font-size:clamp(1.8rem,5.5vw,3rem);
color:#c9973a;text-align:center;
text-shadow:0 0 30px rgba(201,151,58,0.4);
}

#gallery{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}

.bg-orb{position:absolute;border-radius:50%;pointer-events:none}
.bg-orb-1{width:50vw;height:50vw;background:radial-gradient(circle,rgba(201,151,58,0.06) 0%,transparent 70%);top:10%;left:25%}
.bg-orb-2{width:30vw;height:30vw;background:radial-gradient(circle,rgba(139,90,30,0.08) 0%,transparent 70%);bottom:5%;right:10%}

#track{
position:absolute;
display:flex;align-items:center;
gap:clamp(20px,4vw,60px);
cursor:grab;
user-select:none;
left:0;top:50%;
transform:translateY(-50%);
transition:left 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
white-space:nowrap;
}
#track.dragging{cursor:grabbing;transition:none}

.sword-card{
display:inline-flex;flex-direction:column;align-items:center;
flex-shrink:0;
width:clamp(210px,32vw,350px);
padding:20px 10px 28px;
direction:rtl;
}
.polygon-wrap{
position:relative;
width:clamp(190px,30vw,330px);
height:clamp(210px,34vw,370px);
margin-bottom:1.4rem;
overflow:visible;
}
.poly-bg{position:absolute;inset:0;width:100%;height:100%}
.sword-img-wrap{
position:absolute;
inset:-18% -15%;
display:flex;align-items:center;justify-content:center;
}
.sword-img-wrap img{width:100%;height:100%;object-fit:contain}

.sword-name{
font-family:'Scheherazade New',serif;
font-size:clamp(1.35rem,3.5vw,2rem);
color:#c9973a;text-align:center;line-height:1.2;margin-bottom:0.35rem;
white-space:normal;
}
.sword-region{
font-size:clamp(0.75rem,1.8vw,1rem);
color:#6a4f20;letter-spacing:0.08em;margin-bottom:0.55rem;text-align:center;
}
.sword-desc{
font-size:clamp(0.8rem,1.8vw,1rem);
color:#9a8060;text-align:center;line-height:1.8;
max-width:280px;white-space:normal;
}
.sword-card.active .sword-name{color:#d4a840}

#dots{
position:absolute;bottom:clamp(8px,2vh,18px);left:50%;
transform:translateX(-50%);
display:flex;gap:8px;z-index:5;
}
.dot{width:6px;height:6px;border-radius:50%;background:#3a2a10;transition:background 0.3s,transform 0.3s;cursor:pointer}
.dot.active{background:#c9973a;transform:scale(1.4)}

.nav-btn{
position:absolute;top:50%;transform:translateY(-50%);
background:rgba(201,151,58,0.08);
border:1px solid rgba(201,151,58,0.25);
color:#c9973a;
width:clamp(36px,5vw,52px);height:clamp(36px,5vw,52px);
border-radius:50%;font-size:1.3rem;
cursor:pointer;z-index:5;
display:flex;align-items:center;justify-content:center;
transition:background 0.3s;
}
.nav-btn:hover{background:rgba(201,151,58,0.22)}
.btn-right{right:clamp(6px,1.5vw,18px)}
.btn-left{left:clamp(6px,1.5vw,18px)}

.ornament{display:flex;align-items:center;gap:10px;margin-bottom:0.4rem}
.ornament-line{width:28px;height:1px;background:rgba(201,151,58,0.3)}
.ornament-diamond{width:5px;height:5px;background:#c9973a;transform:rotate(45deg)}

footer{height:clamp(26px,4vh,44px);display:flex;align-items:center;justify-content:center;background:linear-gradient(0deg,#0d0906 0%,transparent 100%);flex-shrink:0}
</style>
</head>
<body>

<!-- hidden audio -->
<audio id="bgAudio" loop></audio>

<!-- ① INTRO PAGE -->
<div id="intro">
<div class="intro-title">الحسام</div>
<div class="intro-line"></div>
<div class="intro-label">اختر موسيقى للمعرض</div>

<div class="file-zone">
<label class="file-pick-btn">
اختر ملف صوتي
<input type="file" accept="audio/*" id="audioFile">
</label>
<div class="file-chosen" id="fileChosen">لم يتم اختيار ملف</div>
</div>

<div class="intro-actions">
<button id="introFsBtn" title="ملء الشاشة">
<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#c9973a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
<line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
</svg>
</button>
<button id="startBtn">افتح المعرض</button>
</div>
</div>

<!-- ② SPLASH -->
<div id="splash">
<div class="splash-royals">
<div class="royal-block">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTMTfFs0UUvV-nMS425a0j1gjhi2_ci-mMJSC_Me5A6mQ&s" alt="الملك سلمان" onerror="this.src='https://placehold.co/120x120/1a0e05/c9973a?text=الملك'">
<div class="royal-label">خادم الحرمين الشريفين<br>الملك سلمان بن عبدالعزيز</div>
</div>
<div class="royal-block">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTM1dpmvrkWfHvUrSoLVjeSHAjtdpwZQ863yamV3NNjwAla7KhQlBBubFkTBTj8v1K8O_rLZX4ntkCBHcB___Jc6LJJgu3oU-_puzOOvDo&s=10" alt="الأمير محمد بن سلمان" onerror="this.src='https://placehold.co/120x120/1a0e05/c9973a?text=الأمير'">
<div class="royal-label">سمو ولي العهد<br>الأمير محمد بن سلمان</div>
</div>
</div>
<div class="splash-title">الحسام</div>
<div class="splash-line"></div>
<div class="splash-sub">مشروع من معاذ أنيس 🇲🇲</div>
</div>

<!-- ③ APP -->
<div id="app">
<header>
<div class="header-title">الحسام</div>
</header>
<div id="gallery">
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<button class="nav-btn btn-right" id="btnRight">&#8250;</button>
<button class="nav-btn btn-left" id="btnLeft">&#8249;</button>
<div id="track"></div>
<div id="dots"></div>
</div>
<footer></footer>
</div>

<script>
const swords = [
{name:"السيف العربي الكلاسيكي",region:"الجزيرة العربية",desc:"السيف المستقيم ذو الشفرة الحادة، رمز العزة والكرامة في التراث العربي",img:"1.png",color:"#c9973a",poly:[[50,2],[90,15],[98,50],[85,90],[50,98],[15,90],[2,50],[10,15]]},
{name:"السيف الحجازي",region:"الحجاز",desc:"سيف المنطقة المقدسة، عُرف باتزانه ودقة صناعته على يد أمهر الحدادين",img:"2.png",color:"#b07830",poly:[[50,5],[88,18],[95,55],[80,88],[50,96],[20,88],[5,55],[12,18]]},
{name:"الخنجر النجدي",region:"نجد",desc:"خنجر قصير بحدّين، محلّى بزخارف هندسية مستوحاة من عمارة الطين النجدية",img:"3.png",color:"#a06828",poly:[[50,3],[85,20],[92,50],[82,85],[50,97],[18,85],[8,50],[15,20]]},
{name:"سيف الزبيدي",region:"جازان",desc:"سيف الجنوب ذو الشفرة المنحنية، يجمع بين القوة البدنية والجمالية الفنية",img:"4.png",color:"#c08030",poly:[[48,2],[86,12],[96,45],[88,80],[55,97],[18,88],[4,55],[8,22]]},
{name:"السيف الصوري",region:"المنطقة الشرقية",desc:"صُنع على ضفاف الخليج، ويتميز بمقبضه العاجي المنقوش ونقوشه الذهبية الدقيقة",img:"5.png",color:"#d4a840",poly:[[50,4],[87,16],[94,52],[83,87],[50,96],[17,87],[6,52],[13,16]]},
{name:"الجنبية العسيرية",region:"عسير",desc:"رمز الرجولة والشموخ في جبال عسير، تُهدى في المناسبات الكبرى تكريماً للرجال",img:"6.png",color:"#b88028",poly:[[52,3],[89,14],[97,48],[86,84],[52,97],[16,84],[3,48],[11,14]]}
];

/* ── AUDIO ── */
const audio = document.getElementById('bgAudio');
const audioFile = document.getElementById('audioFile');
const fileChosen = document.getElementById('fileChosen');
let audioReady = false;

audioFile.addEventListener('change', () => {
const f = audioFile.files[0];
if (!f) return;
fileChosen.textContent = f.name;
const url = URL.createObjectURL(f);
audio.src = url;
audioReady = true;
});

/* ── FULLSCREEN (intro only) ── */
const introFsBtn = document.getElementById('introFsBtn');
const fsExpand = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#c9973a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`;
const fsCollapse = `<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#c9973a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>`;

introFsBtn.innerHTML = fsExpand;
introFsBtn.addEventListener('click', () => {
const el = document.documentElement;
if (!document.fullscreenElement && !document.webkitFullscreenElement) {
if (el.requestFullscreen) el.requestFullscreen();
else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
} else {
if (document.exitFullscreen) document.exitFullscreen();
else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
}
});
document.addEventListener('fullscreenchange', () => {
introFsBtn.innerHTML = document.fullscreenElement ? fsCollapse : fsExpand;
});
document.addEventListener('webkitfullscreenchange', () => {
introFsBtn.innerHTML = document.webkitFullscreenElement ? fsCollapse : fsExpand;
});

/* ── START ── */
document.getElementById('startBtn').addEventListener('click', () => {
// hide intro
const intro = document.getElementById('intro');
intro.classList.add('hide');

// start audio if chosen
if (audioReady) audio.play().catch(()=>{});

setTimeout(() => {
intro.style.display = 'none';
// show splash
const splash = document.getElementById('splash');
splash.classList.add('visible');

// after 3s fade splash → show gallery
setTimeout(() => {
splash.classList.add('hide');
setTimeout(() => {
splash.style.display = 'none';
document.getElementById('app').classList.add('show');
init();
}, 1200);
}, 3000);
}, 900);
});

/* ── GALLERY ── */
let current = 0, dragStartX = 0, isDragging = false;
const track = document.getElementById('track');
const dotsEl = document.getElementById('dots');

function uid(){return Math.random().toString(36).slice(2,7)}

function buildPolygon(pts, color) {
const id = 'g'+uid();
const p = pts.map(([x,y])=>`${x},${y}`).join(' ');
return `<svg viewBox="0 0 100 100" preserveAspectRatio="none" class="poly-bg" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="${color}" stop-opacity="0.18"/>
<stop offset="100%" stop-color="${color}" stop-opacity="0.04"/>
</linearGradient></defs>
<polygon points="${p}" fill="url(#${id})" stroke="${color}" stroke-width="0.8" stroke-opacity="0.45"/>
</svg>`;
}

function updateView() {
const cardW = track.children[0] ? track.children[0].offsetWidth : 300;
const gap = parseInt(getComputedStyle(track).gap) || 40;
track.style.left = (window.innerWidth/2 - cardW/2 - current*(cardW+gap)) + 'px';
Array.from(track.children).forEach((c,i) => c.classList.toggle('active', i===current));
Array.from(dotsEl.children).forEach((d,i) => d.classList.toggle('active', i===current));
}

function goTo(idx) {
current = Math.max(0, Math.min(swords.length-1, idx));
updateView();
}

document.getElementById('btnRight').addEventListener('click', () => goTo(current+1));
document.getElementById('btnLeft').addEventListener('click',  () => goTo(current-1));

function onStart(e){isDragging=true;dragStartX=e.touches?e.touches[0].clientX:e.clientX;track.classList.add('dragging')}
function onMove(e){if(!isDragging)return;const x=e.touches?e.touches[0].clientX:e.clientX;if(Math.abs(dragStartX-x)>5)e.preventDefault()}
function onEnd(e){
if(!isDragging)return;isDragging=false;track.classList.remove('dragging');
const x=e.changedTouches?e.changedTouches[0].clientX:e.clientX;
const diff=dragStartX-x;
if(diff>50)goTo(current+1);else if(diff<-50)goTo(current-1);
}
track.addEventListener('mousedown',onStart);
track.addEventListener('mousemove',onMove);
track.addEventListener('mouseup',onEnd);
track.addEventListener('mouseleave',onEnd);
track.addEventListener('touchstart',onStart,{passive:true});
track.addEventListener('touchmove',onMove,{passive:false});
track.addEventListener('touchend',onEnd);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goTo(current+1);if(e.key==='ArrowLeft')goTo(current-1)});
window.addEventListener('resize',updateView);

function init() {
swords.forEach((s,i) => {
const div = document.createElement('div');
div.className = 'sword-card'+(i===0?' active':'');
div.innerHTML = `
<div class="polygon-wrap">
${buildPolygon(s.poly,s.color)}
<div class="sword-img-wrap">
<img src="${s.img}" alt="${s.name}" onerror="this.src='https://placehold.co/200x300/1a0e05/c9973a?text=%E2%9A%94'">
</div>
</div>
<div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>
<div class="sword-name">${s.name}</div>
<div class="sword-region">◆ ${s.region} ◆</div>
<div class="sword-desc">${s.desc}</div>
`;
track.appendChild(div);
});
dotsEl.innerHTML='';
swords.forEach((_,i)=>{
const d=document.createElement('div');
d.className='dot'+(i===0?' active':'');
d.addEventListener('click',()=>goTo(i));
dotsEl.appendChild(d);
});
setTimeout(updateView,60);
}
</script>
</body>
</html>
